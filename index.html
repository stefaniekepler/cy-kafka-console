<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Kafka Console</title>
    <style>
      body { font-family: -apple-system, "Segoe UI", system-ui, sans-serif; margin: 0;
             display: flex; align-items: center; justify-content: center; height: 100vh;
             background: #1f2430; color: #e6e6e6; }
      main { text-align: center; padding: 24px; max-width: 420px; }
      h1 { font-size: 18px; margin: 0 0 12px; }
      .spinner { width: 28px; height: 28px; margin: 16px auto 0; border: 3px solid #3a4150;
                 border-top-color: #4f9cf9; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      pre { text-align: left; background: #161a22; padding: 12px; border-radius: 6px;
            max-height: 160px; overflow: auto; font-size: 12px; white-space: pre-wrap; }
      button { margin: 6px; padding: 6px 16px; border: 0; border-radius: 6px; cursor: pointer;
               background: #4f9cf9; color: #fff; }
      button.secondary { background: #3a4150; }
    </style>
  </head>
  <body>
    <main id="app">
      <section id="loading">
        <h1>Kafka Console</h1>
        <p>正在启动后端服务…</p>
        <div class="spinner"></div>
      </section>
      <section id="error" hidden>
        <h1>启动失败</h1>
        <pre id="error-detail"></pre>
        <p>可重试，或查看日志后退出。</p>
        <button id="retry">重试</button>
        <button id="open-logs" class="secondary">打开日志</button>
        <button id="quit" class="secondary">退出</button>
      </section>
    </main>
    <script type="module" src="/src/splash.ts"></script>
  </body>
</html>
